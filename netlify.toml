[build]
  command = "npm run build"
  publish = "dist"

# Pin Node 18 so native fetch is available in serverless functions
[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"

# ── Headers ──────────────────────────────────────────────────────────────────
# Explicit MIME types prevent the CDN ever returning text/html for script files.
# This matters when a browser fetches <script type="module"> — wrong MIME type
# causes an immediate "Failed to load module script" error.

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "*.mjs"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

# Vite hashes asset filenames → safe to cache forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML must never be cached so deploys take effect immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Redirects are handled by public/_redirects (copied to dist/ by Vite).
# That file takes precedence over netlify.toml redirects and explicitly
# excludes static asset extensions from the SPA catch-all.
